<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>WorldCup2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
body{font-family:'Segoe UI',sans-serif;background:#080814;color:#dde;min-height:100vh;padding-bottom:calc(70px + env(safe-area-inset-bottom))}

/* ─── HEADER ─── */
.header{background:linear-gradient(135deg,#0d0d2e,#1a1a50);padding:12px 16px;padding-top:calc(12px + env(safe-area-inset-top));border-bottom:2px solid #2a2a6a;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
.header h1{font-size:1.2rem;color:#fff;letter-spacing:.5px}
.header p{color:#8888bb;font-size:.72rem;margin-top:1px}
.header-refresh{margin-left:auto;background:none;border:1px solid #334;color:#8899bb;border-radius:6px;padding:6px 10px;font-size:1rem;cursor:pointer;min-width:44px;min-height:44px}

/* ─── BOTTOM TABS ─── */
.tabs{position:fixed;bottom:0;left:0;right:0;display:flex;background:#0c0c20;border-top:2px solid #1e1e44;z-index:200;padding-bottom:env(safe-area-inset-bottom)}
.tab{flex:1;padding:12px 4px 10px;text-align:center;cursor:pointer;color:#6677aa;font-size:.7rem;border-top:3px solid transparent;transition:all .15s;user-select:none;display:flex;flex-direction:column;align-items:center;gap:2px;min-height:56px;-webkit-user-select:none}
.tab .tab-icon{font-size:1.3rem}
.tab.active{color:#fff;border-top:3px solid #5566ff;background:#10102a}

/* ─── PAGES ─── */
.page{display:none;padding:12px}
.page.active{display:block}

/* ─── WORLD CUP ─── */
.wc-filters{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;scrollbar-width:none}
.wc-filters::-webkit-scrollbar{display:none}
.filter-btn{flex-shrink:0;padding:8px 14px;border:1px solid #2a2a55;background:#0d0d28;color:#9999bb;border-radius:20px;font-size:.8rem;cursor:pointer;white-space:nowrap;transition:all .15s;min-height:44px}
.filter-btn.active{background:#2233aa;color:#fff;border-color:#4455cc}

.match-count{font-size:.75rem;color:#6677aa;margin-bottom:10px}

.matches-grid{display:flex;flex-direction:column;gap:6px}

.match-card{background:#0d0d24;border:1px solid #1a1a3a;border-radius:10px;padding:10px 12px;transition:border-color .15s}
.match-card.live{border-left:3px solid #ff3333}
.match-card.final{border-left:3px solid #33aa55}
.match-card.upcoming{border-left:3px solid #3344bb}

.mc-top{font-size:.7rem;color:#7788aa;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.mc-top .mc-note{color:#444466;font-size:.68rem;text-align:right;max-width:50%;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}

.mc-teams{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:6px}
.mc-team{display:flex;align-items:center;gap:5px;font-size:.85rem;font-weight:600}
.mc-team.home{justify-content:flex-end;text-align:right}
.mc-team.away{text-align:left}
.mc-team img{width:20px;height:20px;object-fit:contain;flex-shrink:0}
.mc-team span{line-height:1.2}

.mc-score{text-align:center}
.mc-score .score{font-size:1.2rem;font-weight:700;color:#fff;letter-spacing:2px;white-space:nowrap}
.mc-score .score-vs{font-size:.8rem;color:#445;padding:4px 0}
.status-badge{font-size:.65rem;padding:2px 7px;border-radius:8px;display:inline-block;margin-top:3px;white-space:nowrap}
.sb-live{background:#880000;color:#ffaaaa}
.sb-final{background:#1a4428;color:#88cc88}
.sb-upcoming{background:#12123a;color:#7788cc}

.loading{text-align:center;padding:50px 20px;color:#7788aa;font-size:.95rem}
.error-box{background:#1a0000;border:1px solid #440000;color:#ff8888;border-radius:8px;padding:14px;margin:10px 0;font-size:.85rem;line-height:1.5}
.no-data{text-align:center;padding:40px;color:#444466;font-size:.9rem}

/* ─── BETTING ─── */
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.s-card{background:#0d0d24;border:1px solid #1a1a3a;border-radius:8px;padding:10px 12px;text-align:center}
.s-card .lbl{font-size:.65rem;color:#7788aa;margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px}
.s-card .val{font-size:1.2rem;font-weight:700}
.val.green{color:#44cc66}
.val.red{color:#cc4444}
.val.blue{color:#66aaff}
.val.purple{color:#aa88ff}
.val.white{color:#ccccff}

.upload-zone{border:2px dashed #2a2a55;border-radius:10px;padding:20px 16px;text-align:center;margin-bottom:16px;transition:all .2s}
.upload-zone.drag-over{border-color:#5566cc;background:#0d0d2a}
.upload-zone .uz-title{color:#aabbdd;font-size:.95rem;font-weight:600;margin:6px 0 4px}
.upload-zone p{color:#7788aa;font-size:.8rem;margin-bottom:10px}
.upload-label{display:inline-block;padding:14px 32px;background:#2233aa;color:#fff;border-radius:8px;cursor:pointer;font-size:.9rem;font-weight:600;min-height:44px}

.upload-status{font-size:.78rem;color:#88aacc;margin-top:8px;min-height:1.2em}

.bet-section-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.bet-section-hdr span{font-size:.9rem;font-weight:600;color:#bbccff}
.clear-btn{padding:10px 16px;background:#220033;color:#cc88ff;border:1px solid #440066;border-radius:6px;cursor:pointer;font-size:.78rem;font-weight:600;min-height:44px}

/* Bet cards */
.bet-cards{display:flex;flex-direction:column;gap:8px}

.bet-card{background:#0d0d24;border:1px solid #1a1a3a;border-radius:10px;padding:11px 13px}
.bet-card.won-card{border-left:3px solid #33aa55}
.bet-card.lost-card{border-left:3px solid #cc4444}
.bet-card.placed-card{border-left:3px solid #3344bb}
.bet-card.dep-card{border-left:3px solid #4477cc;background:#0a0a1e}

.bc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:6px}
.bc-match{font-size:.85rem;font-weight:600;color:#ccddff;line-height:1.3;flex:1}
.bc-payout{font-size:.95rem;font-weight:700;white-space:nowrap;padding-top:1px}
.bc-payout.won{color:#44cc66}
.bc-payout.lost{color:#cc4444}
.bc-payout.dep{color:#66aaff;font-style:italic;font-size:.8rem;font-weight:400}
.bc-payout.placed{color:#7788cc}

.bc-sel{font-size:.78rem;color:#9999bb;margin-bottom:6px;line-height:1.4}

.bc-meta{display:flex;flex-wrap:wrap;gap:6px;align-items:center;font-size:.72rem;color:#6677aa}
.bc-meta .bc-stake{color:#aa88ff;font-weight:600}
.bc-meta .bc-status{padding:2px 7px;border-radius:4px;font-size:.68rem;font-weight:600}
.bc-status.settled{background:#1a3322;color:#66cc88}
.bc-status.placed{background:#12123a;color:#7788cc}
.bc-status.other{background:#222;color:#888}

.tag{display:inline-block;font-size:.65rem;padding:2px 6px;border-radius:3px;font-weight:700;letter-spacing:.3px;margin-right:4px;flex-shrink:0}
.tag-1x2{background:#182255;color:#88aaff}
.tag-pts{background:#221a44;color:#cc99ff}
.tag-tg{background:#182a1a;color:#88cc88}
.tag-ah{background:#2a1a08;color:#ffaa66}
.tag-live{background:#2a0808;color:#ff8888}
.tag-parlay{background:#1a2a1a;color:#aaccaa}
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>&#x26BD; WorldCup2026</h1>
    <p>FIFA World Cup 2026 &middot; USA &bull; Canada &bull; Mexico</p>
  </div>
  <button class="header-refresh" onclick="onHeaderRefresh()" title="Refresh">&#x21BB;</button>
</div>

<!-- ══ WORLD CUP RESULTS ══════════════════════════════════ -->
<div id="page-results" class="page active">
  <div class="wc-filters">
    <button class="filter-btn active" onclick="filterMatches('all',this)">All</button>
    <button class="filter-btn" onclick="filterMatches('live',this)">&#x1F534; Live</button>
    <button class="filter-btn" onclick="filterMatches('final',this)">&#x2705; Completed</button>
    <button class="filter-btn" onclick="filterMatches('upcoming',this)">&#x1F4C5; Upcoming</button>
  </div>
  <div class="match-count" id="match-count"></div>
  <div id="matches-container"><div class="loading">Loading matches&#8230;</div></div>
</div>

<!-- ══ BETTING STATS ══════════════════════════════════════ -->
<div id="page-betting" class="page">
  <div class="summary-grid" id="summary-grid"></div>

  <div class="upload-zone" id="upload-zone">
    <div style="font-size:1.6rem">&#x1F4C4;</div>
    <div class="uz-title">Upload SG Pools PDF</div>
    <p>Tap to select your Transaction History PDF</p>
    <label class="upload-label">
      Choose PDF
      <input type="file" accept=".pdf" id="pdf-input" style="display:none" onchange="handleUpload(event)">
    </label>
    <div class="upload-status" id="upload-status"></div>
  </div>

  <div class="bet-section-hdr">
    <span>Transactions (<span id="tx-count">0</span>)</span>
    <button class="clear-btn" onclick="resetData()">&#x21BA; Reset</button>
  </div>
  <div class="bet-cards" id="bet-cards">
    <div class="no-data">Upload a SG Pools PDF to view transactions.</div>
  </div>
</div>

<!-- ══ BOTTOM TABS ══════════════════════════════════════ -->
<div class="tabs">
  <div class="tab active" onclick="switchTab('results',this)">
    <span class="tab-icon">&#x1F3C6;</span>Results
  </div>
  <div class="tab" onclick="switchTab('betting',this)">
    <span class="tab-icon">&#x1F4CA;</span>Betting
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
// ─────────────────────────────────────────────────────────────
//  TABS
// ─────────────────────────────────────────────────────────────
let activeTab = 'results';
function switchTab(id, el) {
  activeTab = id;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
}

function onHeaderRefresh() {
  if (activeTab === 'results') loadMatches();
  else { resetData(); }
}

// ─────────────────────────────────────────────────────────────
//  WORLD CUP — ESPN public API
// ─────────────────────────────────────────────────────────────
let allMatches = [], currentFilter = 'all';

function genDates(from, to) {
  const dates = [], d = new Date(from);
  while (d <= new Date(to)) {
    dates.push(d.toISOString().slice(0,10).replace(/-/g,''));
    d.setDate(d.getDate()+1);
  }
  return dates;
}

async function loadMatches() {
  document.getElementById('matches-container').innerHTML = '<div class="loading">Loading matches&#8230;</div>';
  document.getElementById('match-count').textContent = '';

  const dates = genDates('2026-06-11', '2026-07-19');
  const batches = [];
  for (let i = 0; i < dates.length; i += 7) {
    const chunk = dates.slice(i, i+7);
    batches.push(chunk[0] + '-' + chunk[chunk.length-1]);
  }

  try {
    const results = await Promise.allSettled(
      batches.map(range =>
        fetch(`https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=${range}&limit=100`)
          .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
      )
    );

    allMatches = [];
    const seen = new Set();
    for (const r of results) {
      if (r.status !== 'fulfilled') continue;
      for (const ev of (r.value.events || [])) {
        if (seen.has(ev.id)) continue;
        seen.add(ev.id);
        const comp = ev.competitions?.[0];
        if (!comp) continue;
        const home = comp.competitors?.find(c => c.homeAway === 'home');
        const away = comp.competitors?.find(c => c.homeAway === 'away');
        if (!home || !away) continue;
        const st = comp.status?.type;
        const status = st?.completed ? 'final' : st?.state === 'in' ? 'live' : 'upcoming';
        const date = new Date(ev.date);
        allMatches.push({
          id: ev.id,
          dateObj: date,
          dateFmt: date.toLocaleDateString('en-SG',{day:'2-digit',month:'short',timeZone:'Asia/Singapore'}),
          timeFmt: date.toLocaleTimeString('en-SG',{hour:'2-digit',minute:'2-digit',hour12:false,timeZone:'Asia/Singapore'}),
          home: home.team?.shortDisplayName || home.team?.displayName || '?',
          homeLogo: home.team?.logo || '',
          homeScore: home.score ?? '',
          away: away.team?.shortDisplayName || away.team?.displayName || '?',
          awayLogo: away.team?.logo || '',
          awayScore: away.score ?? '',
          status,
          statusDetail: st?.shortDetail || st?.detail || '',
          note: comp.notes?.[0]?.headline || ''
        });
      }
    }
    allMatches.sort((a,b) => a.dateObj - b.dateObj);
    renderMatches();
  } catch(e) {
    document.getElementById('matches-container').innerHTML =
      `<div class="error-box">&#x26A0; Failed to load match data.<br><small>${e.message}</small><br><br><small>On iPhone: make sure you have internet access, then tap ↻ to retry. If this file was opened from the Files app, try sending it to yourself via Mail and opening from there.</small></div>`;
  }
}

function filterMatches(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  renderMatches();
}

function renderMatches() {
  const filtered = currentFilter === 'all' ? allMatches : allMatches.filter(m => m.status === currentFilter);
  document.getElementById('match-count').textContent = filtered.length + ' match' + (filtered.length !== 1 ? 'es' : '');

  if (!filtered.length) {
    document.getElementById('matches-container').innerHTML = '<div class="no-data">No matches found.</div>';
    return;
  }

  let html = '<div class="matches-grid">';
  for (const m of filtered) {
    const badgeCls  = m.status === 'live' ? 'sb-live' : m.status === 'final' ? 'sb-final' : 'sb-upcoming';
    const badgeText = m.status === 'live' ? (m.statusDetail || 'LIVE') : m.status === 'final' ? 'FT' : m.timeFmt + ' SGT';
    const scoreHtml = m.status === 'upcoming'
      ? '<div class="score-vs">vs</div>'
      : `<div class="score">${m.homeScore}&thinsp;&ndash;&thinsp;${m.awayScore}</div>`;
    const logoH = m.homeLogo ? `<img src="${m.homeLogo}" alt="" onerror="this.style.display='none'">` : '';
    const logoA = m.awayLogo ? `<img src="${m.awayLogo}" alt="" onerror="this.style.display='none'">` : '';

    html += `<div class="match-card ${m.status}">
      <div class="mc-top">
        <span>${m.dateFmt} &bull; ${m.timeFmt} SGT</span>
        <span class="mc-note">${m.note}</span>
      </div>
      <div class="mc-teams">
        <div class="mc-team home"><span>${m.home}</span>${logoH}</div>
        <div class="mc-score">
          ${scoreHtml}
          <span class="status-badge ${badgeCls}">${badgeText}</span>
        </div>
        <div class="mc-team away">${logoA}<span>${m.away}</span></div>
      </div>
    </div>`;
  }
  html += '</div>';
  document.getElementById('matches-container').innerHTML = html;
}

// ─────────────────────────────────────────────────────────────
//  BETTING STATS
// ─────────────────────────────────────────────────────────────
let currentBets = [];

const TYPE_TAG = {
  'parlay': '<span class="tag tag-parlay">PARLAY</span>',
  'pts':    '<span class="tag tag-pts">PTS</span>',
  'tg':     '<span class="tag tag-tg">TG</span>',
  'ah':     '<span class="tag tag-ah">AH</span>',
  '1x2':   '<span class="tag tag-1x2">1X2</span>',
  'live':   '<span class="tag tag-live">LIVE</span>',
  'deposit': ''
};

function renderBetting(bets) {
  const deps        = bets.filter(b => b.type === 'deposit');
  const footy       = bets.filter(b => b.type !== 'deposit');
  const settled     = footy.filter(b => /settled/i.test(b.status));
  const totalDep    = deps.reduce((s,b) => s+b.stake, 0);
  const totalStaked = footy.reduce((s,b) => s+b.stake, 0);
  const totalWon    = footy.reduce((s,b) => s+b.payout, 0);
  const net         = totalWon - totalStaked;
  const pending      = footy.filter(b => !/settled|void/i.test(b.status));
  const pendingStake = pending.reduce((s,b) => s+b.stake, 0);
  const settledNet  = settled.reduce((s,b) => s+b.payout, 0) - settled.reduce((s,b) => s+b.stake, 0);
  const wins        = settled.filter(b => b.payout > 0).length;
  const winRate     = settled.length ? ((wins / settled.length) * 100).toFixed(1) : '0.0';

  document.getElementById('tx-count').textContent = bets.length;

  if (bets.length === 0) {
    document.getElementById('summary-grid').innerHTML = '';
    document.getElementById('bet-cards').innerHTML = '<div class="no-data">Upload a SG Pools PDF to view transactions.</div>';
    return;
  }

  document.getElementById('summary-grid').innerHTML = `
    <div class="s-card"><div class="lbl">Deposited</div><div class="val blue">$${totalDep.toFixed(2)}</div></div>
    <div class="s-card"><div class="lbl">Total Staked</div><div class="val purple">$${totalStaked.toFixed(2)}</div></div>
    <div class="s-card"><div class="lbl">Total Winnings</div><div class="val ${totalWon>0?'green':'white'}">$${totalWon.toFixed(2)}</div></div>
    <div class="s-card"><div class="lbl">Pending Stake</div><div class="val blue">$${pendingStake.toFixed(2)}</div></div>
    <div class="s-card"><div class="lbl">P&amp;L (settled)</div><div class="val ${settledNet>=0?'green':'red'}">${settledNet>=0?'+':''}$${settledNet.toFixed(2)}</div></div>
    <div class="s-card"><div class="lbl">Win Rate</div><div class="val ${parseFloat(winRate)>=50?'green':'white'}">${winRate}%</div></div>
    <div class="s-card"><div class="lbl">Won / Settled</div><div class="val white">${wins} / ${settled.length}</div></div>
  `;

  let cards = '';
  for (const b of bets) {
    const isDep    = b.type === 'deposit';
    const isWin    = !isDep && b.payout > 0;
    const isPlaced = /placed/i.test(b.status);
    const cardCls  = isDep ? 'dep-card' : isPlaced ? 'placed-card' : isWin ? 'won-card' : 'lost-card';
    const payoutCls = isDep ? 'dep' : isPlaced ? 'placed' : isWin ? 'won' : 'lost';
    const payoutTxt = isDep ? 'Deposit' : isPlaced ? 'Pending' : (isWin ? '+' : '') + '$' + (b.payout||0).toFixed(2);
    const statusCls = /settled/i.test(b.status) ? 'settled' : /placed/i.test(b.status) ? 'placed' : 'other';

    if (isDep) {
      cards += `<div class="bet-card dep-card">
        <div class="bc-top">
          <div class="bc-match">&#x1F4B5; Deposit - PayNow</div>
          <div class="bc-payout dep">$${(b.stake||0).toFixed(2)}</div>
        </div>
        <div class="bc-meta"><span>${b.date}</span></div>
      </div>`;
    } else {
      cards += `<div class="bet-card ${cardCls}">
        <div class="bc-top">
          <div class="bc-match">${TYPE_TAG[b.type]||''}${b.selection}</div>
          <div class="bc-payout ${payoutCls}">${payoutTxt}</div>
        </div>
        <div class="bc-meta">
          <span class="bc-stake">Stake $${(b.stake||0).toFixed(2)}</span>
          <span>&bull;</span>
          <span>${b.eventDate}</span>
          <span>&bull;</span>
          <span class="bc-status ${statusCls}">${b.status}</span>
        </div>
      </div>`;
    }
  }
  document.getElementById('bet-cards').innerHTML = cards;
}

function resetData() {
  currentBets = [];
  renderBetting([]);
  document.getElementById('upload-status').textContent = '';
}

// ─────────────────────────────────────────────────────────────
//  PDF UPLOAD + PARSE
// ─────────────────────────────────────────────────────────────
function handleUpload(e) {
  const f = e.target.files[0];
  if (f) parsePDF(f);
  e.target.value = '';
}

async function parsePDF(file) {
  const statusEl = document.getElementById('upload-status');
  statusEl.textContent = 'Reading ' + file.name + '…';
  try {
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    const buf = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: buf }).promise;

    let allItems = [];
    for (let p = 1; p <= pdf.numPages; p++) {
      const page = await pdf.getPage(p);
      const vp   = page.getViewport({ scale: 1 });
      const tc   = await page.getTextContent();
      for (const item of tc.items) {
        const txt = item.str.trim();
        if (txt) allItems.push({ text: txt, x: item.transform[4], y: vp.height - item.transform[5], page: p });
      }
    }

    const parsed = parseSGPools(allItems);
    if (parsed.length > 0) {
      currentBets = parsed;
      renderBetting(currentBets);
      statusEl.textContent = '✓ ' + parsed.length + ' transactions loaded';
    } else {
      statusEl.textContent = '⚠ No sports bets found. Check the PDF is a SG Pools Transaction History.';
    }
  } catch(err) {
    statusEl.textContent = '✗ Error: ' + err.message;
  }
}

function parseSGPools(allItems) {
  allItems.sort((a, b) => a.page - b.page || a.y - b.y || a.x - b.x);

  const rows = [];
  for (const item of allItems) {
    const r = rows.find(r => r.page === item.page && Math.abs(r.y - item.y) < 5);
    if (r) r.items.push(item);
    else rows.push({ y: item.y, page: item.page, items: [item] });
  }
  for (const r of rows) {
    r.items.sort((a, b) => a.x - b.x);
    r.text = r.items.map(i => i.text).join(' ');
    r.minX = r.items[0].x;
  }

  const allMinX = rows.map(r => r.minX).filter(x => x >= 0);
  const globalMinX = allMinX.length ? Math.min(...allMinX) : 0;
  const LEFT_COL = globalMinX + 150;

  const DATE_RE = /^(\d{1,2}\s+\w{3}\s+\d{4})\b/i;
  const TIME_RE = /(\d{1,2}:\d{2}\s*[AP]M)/i;

  const blocks = [];
  let cur = null;
  for (const row of rows) {
    const inLeftCol = row.minX <= LEFT_COL;
    const dm = inLeftCol && row.text.match(DATE_RE);
    if (dm) {
      if (cur) blocks.push(cur);
      const tm = row.text.match(TIME_RE);
      cur = { date: dm[1] + (tm ? ' ' + tm[1] : ''), lines: [row.text] };
    } else if (cur) {
      if (!TIME_RE.test(cur.date) && inLeftCol && TIME_RE.test(row.text)) {
        cur.date += ' ' + row.text.match(TIME_RE)[1];
      }
      cur.lines.push(row.text);
    }
  }
  if (cur) blocks.push(cur);

  return blocks.map(parseBlock).filter(Boolean);
}

function parseBlock(block) {
  const text = block.lines.join(' ').replace(/\s+/g, ' ');
  const isFootball = /\bFootball\b/i.test(text);
  const isDeposit  = /\bDeposit\b/i.test(text) && !isFootball;
  if (!isFootball && !isDeposit) return null;

  const amounts = [];
  const amtRe = /\$\s*([\d,]+\.\d{2})/g;
  let m;
  while ((m = amtRe.exec(text)) !== null) amounts.push(parseFloat(m[1].replace(',', '')));
  const stake = amounts[0] || 0;
  if (!stake) return null;

  if (isDeposit) {
    return { date: block.date, type: 'deposit', match: '-', betType: 'Deposit', selection: 'Deposit - PayNow', stake, eventDate: '-', status: '-', payout: 0 };
  }

  const stMatch = text.match(/\b(Settled|Placed|Void|Pending|Open)\b/i);
  const status  = stMatch ? stMatch[1] : '-';
  const payout  = (status === 'Settled' && amounts.length >= 2) ? amounts[amounts.length - 1] : 0;

  const txDateBase = block.date.replace(/\s+\d{1,2}:\d{2}.*$/, '').trim();
  const allDates   = [...text.matchAll(/(\d{1,2}\s+\w{3}\s+\d{4})/gi)];
  const eventDate  = (allDates.find(d => d[1].trim() !== txDateBase) || ['', '-'])[1];

  // ── Full bet line: from the league keyword up to the stake amount ($), keeping pick + odds ──
  const LEAGUE_RE = /\b(W Cup|World Cup|Chilean League|Premier League|La Liga|Serie A|Bundesliga|Ligue 1|Eredivisie|Champions League|Europa League|Conference League|MLS|[A-Z][A-Za-z.]+ League|[A-Z][A-Za-z.]+ Cup)\b/i;
  const lm = text.match(LEAGUE_RE);
  let selection;
  if (lm) {
    let tail = text.slice(lm.index);
    const stakeIdx = tail.search(/\$\s*[\d,]+\.\d{2}/);   // cut before the first $ amount (the stake)
    if (stakeIdx > 0) tail = tail.slice(0, stakeIdx);
    selection = tail
      .replace(/\b(Single|Multiple|Football|Settled|Placed|Pending|Open|Void)\b/gi, ' ')
      .replace(/\s+/g, ' ')
      .replace(/\s+\d{1,2}\s+\w{3}\s+\d{4}(?=\s*@)/i, '')                            // date sitting before the odds
      .replace(/\s+\d{1,2}\s+\w{3}\s+\d{4}(?:\s+\d{1,2}:\d{2}\s*[AP]M)?\s*$/i, '')   // trailing date/time
      .replace(/\s*-\s*$/, '').trim();
  } else {
    selection = text.substring(0, 120);
  }

  // ── Odds: decimal after an @ sign, e.g. "@ 1.97" ──
  const oddsM = text.match(/@\s*(\d+(?:\.\d+)?)/);
  const odds  = oddsM ? oddsM[1] : '';
  if (odds && !/@/.test(selection)) selection += ' @ ' + odds;

  let betType;
  if (/Pick the Score|Fulltime PTS/i.test(selection)) betType = 'pts';
  else if (/Asian Handicap/i.test(selection))          betType = 'ah';
  else if (/Total Goals/i.test(selection))             betType = 'tg';
  else if ((text.match(/\b1X2\b/g)||[]).length > 1)   betType = 'parlay';
  else if (/\b1X2\b/.test(text))                       betType = '1x2';
  else if (/\(Live\)/i.test(text))                     betType = 'live';
  else betType = 'football';

  const matchName = selection
    .replace(/^(?:W Cup|World Cup|Chilean League|Premier League|La Liga|Serie A|Bundesliga|Ligue 1|MLS|[A-Z][A-Za-z.]+ (?:League|Cup))\s*-\s*/i, '')
    .replace(/\s*-\s*(1X2|Pick the Score|Total Goals.*|Asian Handicap.*|Fulltime PTS.*)$/i, '')
    .trim().substring(0, 80);

  return { date: block.date, type: betType, match: matchName || selection.substring(0, 60), betType: betType.toUpperCase(), selection, odds, stake, eventDate, status, payout };
}

// ─────────────────────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────────────────────
renderBetting([]);
loadMatches();
</script>
